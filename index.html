<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Sharpens Iron</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="web-wrapper">
        <div class="app-container">
            
            <header>
                <h1>IRON SHARPENS IRON</h1>
                <div id="date-display"></div>
                <div id="time-display"></div>
            </header>

            <main>
                <div class="image-display">
                    <img src="background.jpg" alt="Men's Meeting of the Minds" id="main-img">
                </div>

                <div id="display-area">
                    
                    <div id="meeting-info">
                        <h3>MEN'S MEETING</h3>
                        <p><strong>Thursdays</strong></p>
                        <p>6:30 PM - 8:00 PM</p>
                        <p class="address">
                            New Legacy<br>
                            1115 Garvin Pl<br>
                            Louisville, KY 40203
                        </p>
                    </div>

                    <div id="scripture"></div>
                    <div id="affirmation"></div>
                </div>
            </main>

            <footer>
                <button id="affirmation-btn">BIBLE AFFIRMATIONS</button>
            </footer>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
