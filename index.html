<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="style.css">

                        <p class="address">New Legacy<br>1115 Garvin Pl, Louisville, KY 40203</p>
                    </div>
                    <p id="scripture"></p>
                    <p id="affirmation"></p>
                </div>
            </main>

            <footer>
                <button id="affirmation-btn">Get Daily Affirmation</button>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
